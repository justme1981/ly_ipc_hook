jobs:
  build-mips:
    runs-on: ubuntu-latest
    container:
      image: multiarch/crossbuild:latest
    steps:
      - uses: actions/checkout@v3
      - run: |
          mipsel-linux-gnu-gcc -O2 -march=mips32 -mabi=32 -fPIC -shared \
            -o build/hook_rtsp.so hook_rtsp_full.c -lpthread -ldl
      - uses: actions/upload-artifact@v3
        with:
          name: hook_rtsp
          path: build/
