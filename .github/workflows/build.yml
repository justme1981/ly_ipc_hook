name: Build Hook RTSP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-mips:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install MIPS Cross Compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mipsel-linux-gnu build-essential

      - name: Compile Hook
        run: |
          mkdir -p build
          echo "当前目录：$(pwd) 
          ls -l
          mipsel-linux-gnu-gcc -O2 -march=mips32 -mabi=32 -o build/hook_rtsp_hooked hook_rtsp_full.c -lpthread -ldl
          file build/hook_rtsp_hooked

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hook_rtsp_hooked
          path: build/hook_rtsp_hooked
