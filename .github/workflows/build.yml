name: Build MIPS Hook

on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v3

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install MIPS cross-compiler
      run: sudo apt update && sudo apt install -y gcc-mipsel-linux-gnu

    - name: Compile hook_rtsp_full.so
      run: mipsel-linux-gnu-gcc -shared -fPIC hook_rtsp_full.c
