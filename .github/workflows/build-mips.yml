name: Build MIPS Hook

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-mips:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Node.js 24
    container:
      image: multiarch/crossbuild:latest         # Docker 容器，自带 MIPS 工具链

    steps:
      - name: Checkout code
        uses: actions/checkout@v4   # 最新版本支持 Node.js 24

      - name: Create build directory
        run: mkdir -p build

      - name: Compile hook_rtsp.so
        run: |
          mipsel-linux-gnu-gcc -O2 -march=mips32 -mabi=32 -fPIC -shared \
          -o build/hook_rtsp.so hook_rtsp_full.c -lpthread -ldl
          file build/hook_rtsp.so

      - name: Compile hook_rtsp executable
        run: |
          mipsel-linux-gnu-gcc -O2 -march=mips32 -mabi=32 \
          -o build/hook_rtsp_exec hook_rtsp_full.c -lpthread -ldl
          file build/hook_rtsp_exec

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: hook_rtsp
          path: build/
